<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Predictor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <svg class="logo-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="9" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 1 Q14 5 14 10 Q14 15 10 19" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 1 Q6 5 6 10 Q6 15 10 19" stroke="currentColor" stroke-width="1.5"/>
          <line x1="1" y1="10" x2="19" y2="10" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <span>NBA<strong>PREDICT</strong></span>
      </div>
      <div class="header-right">
        <div class="meta" id="meta"></div>
        <div class="fmt-toggle" id="fmt-toggle">
          <button class="fmt-btn active" data-fmt="decimal">Dec</button>
          <button class="fmt-btn" data-fmt="american">Am</button>
        </div>
      </div>
    </div>
  </header>

  <nav class="tab-bar" role="tablist">
    <button class="tab active" data-tab="today" role="tab" id="tab-btn-today" aria-selected="true" aria-controls="tab-today">Today</button>
    <button class="tab" data-tab="yesterday" role="tab" id="tab-btn-yesterday" aria-selected="false" aria-controls="tab-yesterday">Yesterday</button>
    <button class="tab" data-tab="all" role="tab" id="tab-btn-all" aria-selected="false" aria-controls="tab-all">All Predictions</button>
    <button class="tab" data-tab="bracket" role="tab" id="tab-btn-bracket" aria-selected="false" aria-controls="tab-bracket">Bracket</button>
  </nav>

  <main>
    <section id="tab-today" class="tab-content active" role="tabpanel" aria-labelledby="tab-btn-today">
      <div class="section-header" id="today-header"></div>
      <div class="cards-grid" id="today-cards"></div>
    </section>

    <section id="tab-yesterday" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-yesterday">
      <div class="section-header" id="yesterday-header"></div>
      <div class="cards-grid" id="yesterday-cards"></div>
    </section>

    <section id="tab-all" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-all">
      <div class="all-header" id="all-header"></div>
      <div class="filter-bar" id="filter-bar">
        <select id="f-team" class="f-select">
          <option value="">All Teams</option>
        </select>
        <div class="f-chips">
          <button class="chip" data-chip="last7">Last 7d</button>
          <button class="chip" data-chip="last30">Last 30d</button>
          <button class="chip" data-chip="thisMonth">This Month</button>
        </div>
        <div class="f-date-range">
          <input type="date" id="f-date-from" class="f-date">
          <span class="f-date-sep">–</span>
          <input type="date" id="f-date-to" class="f-date">
        </div>
        <select id="f-result" class="f-select">
          <option value="">All Results</option>
          <option value="correct">Correct</option>
          <option value="wrong">Wrong</option>
          <option value="pending">Pending</option>
        </select>
        <select id="f-season" class="f-select">
          <option value="">All Games</option>
          <option value="regular">Regular Season</option>
          <option value="playoffs">Playoffs</option>
        </select>
        <button id="f-reset" class="f-reset" style="display:none">× Reset</button>
      </div>
      <div class="table-wrapper">
        <table id="all-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Home</th>
              <th>Away</th>
              <th>Predicted</th>
              <th>Actual</th>
              <th>Odds</th>
              <th>Result</th>
            </tr>
          </thead>
          <tbody id="all-tbody"></tbody>
        </table>
      </div>
    </section>

    <section id="tab-bracket" class="tab-content" role="tabpanel" aria-labelledby="tab-btn-bracket">
      <div class="bracket-header" id="bracket-header"></div>
      <div class="bracket-outer" id="bracket-outer">
        <div class="bracket-container" id="bracket-container">
          <!-- rendered by app.js -->
        </div>
      </div>
      <div class="bracket-mobile" id="bracket-mobile">
        <!-- rendered by app.js for mobile -->
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
